name: remindme

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  server:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      PORT: 3333
      # A notify-api é alcançável na remindme-net pelo nome do serviço.
      NOTIFY_API_URL: http://notify-api:3334
      NOTIFY_API_KEY: ${NOTIFY_API_KEY}
    # Sem porta no host: o proxy reverso central (caddy-docker-proxy, stack ../media/proxy)
    # descobre este container pela rede proxy-net via labels e termina o TLS.
    # O Express serve o SPA e a API na mesma porta 3333.
    labels:
      caddy: ${REMINDME_DOMAIN}
      caddy.reverse_proxy: "{{upstreams 3333}}"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      default:
      proxy-net:
      remindme-net:
        aliases:
          - remindme-server

volumes:
  postgres_data:

networks:
  # Rede compartilhada com a notify-api (criar uma vez na VPS: docker network create remindme-net).
  remindme-net:
    external: true
  # Rede compartilhada com o proxy reverso central (Caddy). Criar uma vez:
  #   docker network create proxy-net
  proxy-net:
    external: true
